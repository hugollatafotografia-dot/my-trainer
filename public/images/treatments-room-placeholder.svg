<svg width="1500" height="1000" viewBox="0 0 1500 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="88" y1="70" x2="1410" y2="930" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8F7081"/>
      <stop offset="0.48" stop-color="#705666"/>
      <stop offset="1" stop-color="#4C3A48"/>
    </linearGradient>
    <radialGradient id="light" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(332 248) rotate(34) scale(500 328)">
      <stop stop-color="#F6E7EE" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#F6E7EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="1500" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#light)"/>

  <rect x="142" y="196" width="420" height="244" rx="28" fill="rgba(248,239,244,0.34)"/>
  <rect x="180" y="228" width="344" height="180" rx="22" fill="rgba(250,242,246,0.46)"/>

  <rect x="520" y="596" width="726" height="180" rx="30" fill="rgba(255,255,255,0.15)"/>
  <rect x="562" y="638" width="408" height="12" rx="6" fill="rgba(255,255,255,0.72)"/>
  <rect x="562" y="670" width="486" height="10" rx="5" fill="rgba(255,255,255,0.52)"/>
  <rect x="562" y="698" width="288" height="10" rx="5" fill="rgba(255,255,255,0.42)"/>

  <ellipse cx="1092" cy="452" rx="216" ry="262" fill="rgba(238,216,227,0.56)"/>
  <ellipse cx="1174" cy="500" rx="102" ry="182" fill="rgba(227,198,214,0.44)"/>

  <rect width="1500" height="1000" fill="url(#grain)"/>
</svg>

<svg width="1920" height="1200" viewBox="0 0 1920 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="roomBg" x1="124" y1="92" x2="1766" y2="1084" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B6B7B"/>
      <stop offset="0.44" stop-color="#6F5162"/>
      <stop offset="1" stop-color="#4A3544"/>
    </linearGradient>
    <radialGradient id="windowGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(372 232) rotate(33) scale(680 460)">
      <stop stop-color="#F7E9F0" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#F7E9F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="skinLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1408 434) rotate(86) scale(448 336)">
      <stop stop-color="#F7E4EC" stop-opacity="0.92"/>
      <stop offset="0.74" stop-color="#E9CFDA" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#E9CFDA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1520 884) rotate(-145) scale(860 600)">
      <stop stop-color="#241621" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#241621" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurFace" x="1060" y="120" width="780" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <filter id="grain" x="0" y="0" width="1920" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="url(#roomBg)"/>
  <rect width="1920" height="1200" fill="url(#windowGlow)"/>
  <rect width="1920" height="1200" fill="url(#vignette)"/>

  <rect x="84" y="146" width="452" height="322" rx="42" fill="rgba(250,240,246,0.28)"/>
  <rect x="122" y="188" width="376" height="236" rx="34" fill="rgba(248,237,244,0.46)"/>

  <g filter="url(#blurFace)" opacity="0.62">
    <ellipse cx="1406" cy="484" rx="232" ry="344" fill="#F5E3EA"/>
    <ellipse cx="1548" cy="546" rx="118" ry="252" fill="#E3C5D4"/>
  </g>

  <ellipse cx="1386" cy="472" rx="236" ry="332" fill="url(#skinLight)"/>
  <path d="M1206 780C1286 874 1424 926 1614 902C1728 888 1812 834 1876 760" stroke="rgba(255,255,255,0.26)" stroke-width="16" stroke-linecap="round"/>

  <rect x="146" y="776" width="624" height="218" rx="34" fill="rgba(255,255,255,0.14)"/>
  <rect x="202" y="846" width="336" height="14" rx="7" fill="rgba(255,255,255,0.74)"/>
  <rect x="202" y="882" width="430" height="10" rx="5" fill="rgba(255,255,255,0.54)"/>
  <rect x="202" y="912" width="250" height="10" rx="5" fill="rgba(255,255,255,0.44)"/>

  <rect width="1920" height="1200" fill="url(#grain)"/>
</svg>

      <stop offset="1" stop-color="#F7EAF1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hh-light-subject" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1434 456) rotate(88) scale(512 384)">
      <stop stop-color="#F4DFE9" stop-opacity="0.92"/>

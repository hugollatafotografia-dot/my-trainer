<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cf-bg" x1="96" y1="68" x2="1508" y2="936" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6A3A52"/>
      <stop offset="0.5" stop-color="#573245"/>
      <stop offset="1" stop-color="#3C2433"/>
    </linearGradient>
    <radialGradient id="cf-light" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(326 232) rotate(32) scale(542 344)">
      <stop stop-color="#F2D9E6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#F2D9E6" stop-opacity="0"/>
    </radialGradient>
    <filter id="cf-blur" x="956" y="130" width="426" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="cf-grain" x="0" y="0" width="1600" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.76" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.056"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#cf-bg)"/>
  <rect width="1600" height="1000" fill="url(#cf-light)"/>

  <rect x="1028" y="194" width="250" height="530" rx="42" fill="rgba(255,255,255,0.18)"/>
  <rect x="1050" y="218" width="206" height="484" rx="30" fill="rgba(243,230,237,0.4)"/>

  <g filter="url(#cf-blur)" opacity="0.56">
    <rect x="1080" y="266" width="154" height="76" rx="14" fill="#FFF7FB"/>
    <rect x="1080" y="362" width="136" height="58" rx="12" fill="#FAEEF4"/>
    <rect x="1098" y="444" width="136" height="58" rx="12" fill="#D8EEDC"/>
  </g>

  <rect x="138" y="684" width="688" height="194" rx="30" fill="rgba(255,255,255,0.14)"/>
  <rect x="188" y="756" width="340" height="12" rx="6" fill="rgba(255,255,255,0.74)"/>
  <rect x="188" y="788" width="438" height="10" rx="5" fill="rgba(255,255,255,0.5)"/>
  <rect x="188" y="816" width="248" height="10" rx="5" fill="rgba(255,255,255,0.42)"/>

  <rect width="1600" height="1000" fill="url(#cf-grain)"/>
</svg>
